<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — To-Do App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!--  HEADER SECTION -->
  <header>
    <div class="logo-row">
      <div class="logo-dot"></div>
      <h1>TaskFlow</h1>
    </div>
    <p class="subtitle">Your daily task manager — simple & fast</p>
  </header>

  <!-- STATS  -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num total" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num done-num" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-num pending-num" id="stat-pending">0</div>
      <div class="stat-label">Pending</div>
    </div>
  </div>

  <!--  ADD TASK  -->
  <div class="add-section">
    <div class="input-row">
      <input
        class="task-input"
        id="taskInput"
        type="text"
        placeholder="Add a new task…"
        maxlength="150"
      />
      <button class="add-btn" id="addBtn">＋ Add</button>
    </div>
  </div>

  <!-- FILTER TABS  -->
  <div class="filter-tabs">
    <button class="tab active" data-filter="all">All</button>
    <button class="tab" data-filter="pending">Pending</button>
    <button class="tab" data-filter="completed">Completed</button>
  </div>

  <!--  TASK LIST  -->
  <div class="task-list" id="taskList"></div>

  <!--  BOTTOM BAR  -->
  <div class="bottom-bar">
    <button class="clear-btn" id="clearBtn">🗑 Clear Completed</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
